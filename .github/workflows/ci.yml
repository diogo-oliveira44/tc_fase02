name: CI

on:
  push:
    branches:
      - '**'

permissions:
  contents: read

jobs:
  test:
    runs-on: [self-hosted, linux, x64]
    container:
      image: node:24-bullseye-slim

    services:
      db:
        image: postgres
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres

    steps:
      - name: Install packages
        run: |
          apt-get update && apt-get install --no-install-recommends -y postgresql-client libpq-dev

      - name: execs database creation
        run: |
          export PGPASSWORD=postgres
          psql -h db -U postgres -f db/create-databases.sql

      - name: Checkout code
        uses: actions/checkout@v4

      - name: install dependencies
        run: |
          npm install

      - name: Run tests
        run: |
          npm run test

      - name: Run coverage
        env:
          POSTGRES_HOST: db
        run: |
          npm run coverage

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy using ssh
        uses: appleboy/ssh-action@master
        env:
          NODE_ENV: production
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.PRIVATE_KEY }}
          script: |
            mkdir -p ~/.ssh
            echo "${{ secrets.GIT_PRIVATE_KEY }}" > ~/.ssh/github
            eval "$(ssh-agent -s)"
            chmod 600 ~/.ssh/github
            ssh-add ~/.ssh/github
            rm -rf ~/tc_fase02
            cd ~/
            git clone git@github.com:diogobest/tc_fase02.git
            cd tc_fase02
            cp ~/tc_fase02/.env.example ~/tc_fase02/.env
            docker compose down
            docker compose run --rm web npm install
            docker compose up -d
